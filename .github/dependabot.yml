version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-tooling:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@fontsource/*"
    labels:
      - dependencies
      - npm

  - package-ecosystem: pip
    directory: "/tools"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
