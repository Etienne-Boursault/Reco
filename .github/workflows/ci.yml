name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions minimales par défaut. Aucun job n'a besoin d'écrire sur le
# repo. Les jobs qui auraient besoin de permissions supplémentaires
# doivent les déclarer explicitement.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check tools/ tests/ || true
        # `|| true` tant que pyproject.toml n'a pas de config ruff stable.
        # À retirer dès que la config est en place (cf. ADR 0039).

  test-python:
    name: Test Python (pytest)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -q --tb=short

  lint-js:
    name: Lint JS / Astro
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Astro check (types)
        run: npx astro check || true
        # Non bloquant tant que tous les types Astro 5 ne sont pas stabilisés.

  test-vitest:
    name: Test Vitest (SEO + OG)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run vitest
        run: npm run test:seo

  build:
    name: Build SSG
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: https://example.com
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # Note : l'a11y (statique + contraste + pa11y informatif) est gérée
  # par le workflow dédié `.github/workflows/a11y.yml` (cf. ADR 0024).
  # On ne la duplique pas ici.

  ci-summary:
    name: CI summary
    needs: [lint-python, test-python, lint-js, test-vitest, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          echo "lint-python: ${{ needs.lint-python.result }}"
          echo "test-python: ${{ needs.test-python.result }}"
          echo "lint-js:     ${{ needs.lint-js.result }}"
          echo "test-vitest: ${{ needs.test-vitest.result }}"
          echo "build:       ${{ needs.build.result }}"
          if [[ "${{ needs.test-python.result }}" != "success" ]] \
             || [[ "${{ needs.test-vitest.result }}" != "success" ]] \
             || [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Un job bloquant a échoué."
            exit 1
          fi
