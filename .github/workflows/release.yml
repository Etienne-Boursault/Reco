name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # créer la GH Release
  packages: write   # publier l'image Docker dans GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog-check:
    name: Vérifier CHANGELOG
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Extraire la version du tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Vérifier une entrée pour ${{ steps.ver.outputs.version }}
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md absent — création recommandée."
            exit 0
          fi
          if ! grep -qE "^##\s+\[?${{ steps.ver.outputs.version }}\]?" CHANGELOG.md; then
            echo "::error::Aucune entrée pour la version ${{ steps.ver.outputs.version }} dans CHANGELOG.md."
            exit 1
          fi

  build-and-test:
    name: Build + tests (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - run: npm ci
      - run: pip install -r tools/requirements.txt pytest

      - run: npm run test:seo
      - run: pytest tests/ -q
      - run: SITE_URL=https://example.com npm run build

  build-docker:
    name: Build & push image Docker
    needs: [changelog-check, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Créer la GitHub Release
    needs: [changelog-check, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Générer notes de release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ${{ hashFiles('CHANGELOG.md') != '' && 'CHANGELOG.md' || '' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # NOTE : publication npm volontairement désactivée tant qu'on n'a pas
  # statué sur le nom (`reco` est probablement pris) et le scope.
  # Ré-activer en ajoutant un job `publish-npm` avec `secrets.NPM_TOKEN`.
