name: Security audit

on:
  schedule:
    - cron: '0 6 * * 1'   # tous les lundis 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tools/requirements.txt'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
        # Informatif : on ne casse pas la CI tant qu'on n'a pas trié les
        # vulnérabilités transitives héritées d'astro/satori.

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit tools/requirements.txt
        run: pip-audit -r tools/requirements.txt --strict
        continue-on-error: true

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
